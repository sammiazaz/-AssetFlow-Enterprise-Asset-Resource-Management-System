<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AssetFlow — Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@400;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#ededf8",
                        "tertiary-fixed": "#ffdbca",
                        "tertiary-container": "#be5600",
                        "inverse-surface": "#2e3038",
                        "on-surface": "#191b23",
                        "primary-container": "#376ced",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f0f0fb",
                        "on-surface-variant": "#434654",
                        "secondary-fixed": "#e1e0ff",
                        "on-tertiary-container": "#fffbff",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#00174b",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#dbe1ff",
                        "surface-container-highest": "#e1e2ed",
                        "on-tertiary-fixed": "#331200",
                        "outline": "#737686",
                        "surface-tint": "#1154d5",
                        "on-primary-container": "#fefcff",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#fffbff",
                        "surface-variant": "#e1e2ed",
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "inverse-primary": "#b4c5ff",
                        "on-secondary-fixed": "#07006c",
                        "background": "#faf8ff",
                        "tertiary-fixed-dim": "#ffb68e",
                        "surface-container-low": "#f3f3fe",
                        "on-background": "#191b23",
                        "surface-dim": "#d9d9e4",
                        "surface": "#faf8ff",
                        "secondary": "#4648d4",
                        "surface-bright": "#faf8ff",
                        "tertiary": "#984300",
                        "secondary-fixed-dim": "#c0c1ff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#6063ee",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#773300",
                        "surface-container-high": "#e7e7f2",
                        "primary": "#0a51d3",
                        "on-primary-fixed-variant": "#003ea8",
                        "primary-fixed-dim": "#b4c5ff",
                        "outline-variant": "#c3c6d7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sidebar_width": "220px",
                        "stack_lg": "32px",
                        "stack_md": "16px",
                        "card_padding": "24px",
                        "gutter": "24px",
                        "container_margin": "32px",
                        "base": "4px",
                        "stack_sm": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Geist"],
                        "headline-lg": ["Geist"],
                        "body-lg": ["Inter"],
                        "headline-sm": ["Geist"],
                        "display-kpi": ["Geist"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg-mobile": ["Geist"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "display-kpi": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ambient-shadow {
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.04);
        }
        .deep-shadow {
            box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="bg-inverse-surface min-h-screen flex items-center justify-center p-4">
<!-- Auth Card -->
<div class="bg-surface w-full max-w-md rounded-[20px] p-stack_lg flex flex-col gap-stack_lg deep-shadow relative overflow-hidden">
<!-- Animated Background Accent (Subtle) -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary opacity-5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-48 h-48 bg-secondary opacity-10 rounded-full blur-3xl"></div>
<!-- Header -->
<div class="flex flex-col items-center gap-stack_md text-center z-10">
<!-- Logo Badge -->
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-on-primary font-headline-md text-headline-md shadow-lg">
                AF
            </div>
<div>
<h1 class="font-headline-md text-headline-md text-on-surface">AssetFlow — Login</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Enter your credentials to access your workspace</p>
</div>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-stack_md z-10" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant ml-2 uppercase tracking-wider" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-full py-3.5 pl-12 pr-6 font-body-md text-body-md focus:ring-2 focus:ring-primary/20 placeholder:text-outline-variant transition-all outline-none" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center px-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-full py-3.5 pl-12 pr-6 font-body-md text-body-md focus:ring-2 focus:ring-primary/20 placeholder:text-outline-variant transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-outline" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-4 rounded-full mt-4 hover:brightness-110 active:scale-[0.98] transition-all shadow-md" type="submit">
                Sign In
            </button>
</form>
<!-- Divider -->
<div class="relative flex items-center z-10">
<div class="flex-grow border-t border-surface-container-highest"></div>
<span class="flex-shrink mx-4 font-label-md text-label-md text-outline-variant">OR</span>
<div class="flex-grow border-t border-surface-container-highest"></div>
</div>
<!-- New Here Section -->
<div class="flex flex-col gap-stack_md text-center z-10">
<div class="bg-secondary-fixed/30 rounded-xl p-4">
<p class="font-label-md text-label-md text-on-secondary-fixed-variant leading-relaxed">
                    New here? Sign up creates an Employee account — admin roles assigned later
                </p>
</div>
<button class="w-full bg-surface border border-primary text-primary font-headline-sm text-headline-sm py-4 rounded-full hover:bg-primary/5 active:scale-[0.98] transition-all">
                Create Account
            </button>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-secondary/10 rounded-full blur-[120px]"></div>
</div>
<script>
        // Simple click interaction for the password visibility toggle
        const toggleBtn = document.querySelector('button .material-symbols-outlined[data-icon="visibility"]' || 'button .material-symbols-outlined');
        const passwordInput = document.getElementById('password');
        
        if (toggleBtn && passwordInput) {
            toggleBtn.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                toggleBtn.textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        }

        // Add some basic hover state logic for buttons via JS if needed for micro-animations
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                btn.style.transform = 'translateY(-1px)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'translateY(0)';
            });
        });
    </script>
</body></html>
